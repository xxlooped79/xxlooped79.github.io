<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esteban Hernandez | Contact</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<nav>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
    <a href="sandbox.html">Sandbox</a>
    <a href="api.html">API</a>
  </div>
</nav>


<header class="hero">
  <h1>Contact Me</h1>
  <p class="subtitle">I’d love to hear from you</p>
</header>

<main class="container">

<section class="card contact-card">

<form action="https://formsubmit.co/ehernandez2@hcc-nd.edu" method="POST">

  <input type="hidden" name="_subject" value="New Contact Form Submission">
  <input type="hidden" name="_next" value="thankyou.html">

  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
  </div>

  <button class="btn" type="submit">Send Message</button>

</form>

</section>

</main>


<footer>
  <p>© 2026 Esteban Hernandez</p>
  <p class="footer-sub">Let’s connect</p>
</footer>

<script>
document.querySelector("form").addEventListener("submit", function(event) {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message").value.trim();

  if (!name || !email || !message) {
    event.preventDefault();
    alert("Please fill out all fields before submitting.");
  }
});
</script>

</body>
</html>
